<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>つくったもの</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f7f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #2f5d2f;
    }

    h2 {
      margin-top: 40px;
      color: #3a6b3a;
    }

    .section {
      margin-bottom: 40px;
    }

    .card {
      display: flex;
      gap: 20px;
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      margin-top: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: transform 0.15s;

      /* 追加 */
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .thumb {
      width: 240px;
      height: 160px;
      border-radius: 8px;
      object-fit: cover;
      background: #d8e8d8;
    }

    .content {
      flex: 1;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      color: #2f7d32;
    }

    .desc {
      margin-top: 6px;
      color: #555;
      font-size: 15px;
    }
  </style>
</head>
<body>

<h1>つくったもの</h1>

<div id="app"></div>

<script>
const data = [
  {
    category: "ひらがな",
    items: [
      {
        title: "ひらがなかたかなならびかえ",
        url: "https://kyozaidukuru.github.io/hiragana_tango_narabekae/",
        desc: "ひらがな　カタカナで　つくった　ことばが　バラバラに　なります。正しく　ならびかえて　もとの　ことばを　あてあおう。",
        thumb: "thumb1.PNG"
      },
      {
        title: "フラッシュことば",
        url: "https://kyozaidukuru.github.io/flash-word/",
        desc: "いっしゅんだけ　見える　ことばをを　こえに出して　いうゲームです。",
        thumb: "thumb2.gif"
      }
    ]
  },
  {
    category: "漢字",
    items: [
      {
        title: "漢字のまど",
        url: "https://kyozaidukuru.github.io/hidden-kanji/",
        desc: "□でかくされた漢字を、少ないヒントで充てるゲームです。",
        thumb: "thumb3.PNG"
      },
      {
        title: "漢字パズル",
        url: "https://kyozaidukuru.github.io/kanji_puzzle/",
        desc: "バラバラになった漢字を正しく組み立てるゲームです。",
        thumb: "thumb4.gif"
      }
    ]
  },
  {
    category: "その他",
    items: [
      {
        title: "残り時間がみえる学習タイマー",
        url: "https://kyozaidukuru.github.io/timer/",
        desc: "60分まで設定できるタイマーです。",
        thumb: "thumb5.PNG"
      }
    ]
  }
];

const app = document.getElementById("app");

data.forEach(section => {
  const sectionDiv = document.createElement("div");
  sectionDiv.className = "section";

  const title = document.createElement("h2");
  title.textContent = section.category;
  sectionDiv.appendChild(title);

  section.items.forEach(item => {
    // 
    const card = document.createElement("a");
    card.href = item.url;
    card.target = "_blank";
    card.rel = "noopener noreferrer";
    card.className = "card";

    const img = document.createElement("img");
    img.className = "thumb";
    img.src = item.thumb;
    card.appendChild(img);

    const content = document.createElement("div");
    content.className = "content";

    // 
    const titleText = document.createElement("div");
    titleText.textContent = item.title;
    titleText.className = "title";

    const desc = document.createElement("div");
    desc.className = "desc";
    desc.textContent = item.desc;

    content.appendChild(titleText);
    content.appendChild(desc);
    card.appendChild(content);

    sectionDiv.appendChild(card);
  });

  app.appendChild(sectionDiv);
});
</script>

</body>
</html>
